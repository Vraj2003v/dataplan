spring:
  datasource:
    url: ${DATABASE_URL}
    driver-class-name: org.postgresql.Driver
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080

app:
  jwt:
    secret: ZGF0YXBsYW4tc3VwZXItc2VjcmV0LWtleS0yMDI0LW1pbi0yNTYtYml0cy1sb25nLWZvci1zZWN1cml0eQ==
    expiration: 86400000

crawler:
  output-dir: ./crawled-data

logging:
  level:
    com.dataplan: INFO
    org.springframework.security: WARN