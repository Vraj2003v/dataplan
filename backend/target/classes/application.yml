spring:
  datasource:
    url: jdbc:h2:file:./dataplan-db;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    database-platform: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080

app:
  jwt:
    secret: ZGF0YXBsYW4tc3VwZXItc2VjcmV0LWtleS0yMDI0LW1pbi0yNTYtYml0cy1sb25nLWZvci1zZWN1cml0eQ==
    expiration: 86400000

crawler:
  output-dir: ./crawled-data

logging:
  level:
    com.dataplan: INFO
    org.springframework.security: WARN
